<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        
        /* DISEÑO DE REGISTRO (RECUPERADO) */
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: var(--card); padding: 35px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; position: relative; }
        .auth-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); border-radius: 20px 20px 0 0; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        input { width: 100%; padding: 12px 12px 12px 45px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main { background: var(--primary); color: black; }

        /* TIENDA TIPO CUADRÍCULA (NUEVO) */
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; position: relative; }
        .product-img { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .product-info { padding: 10px; }
        .product-price { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        .product-title { font-size: 0.9em; color: #ccc; margin: 5px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* SECCIÓN P2P CHAT */
        #chat-view { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; background: var(--card); display: flex; align-items: center; gap: 15px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 75%; font-size: 14px; }
        .sent { background: #007bff; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
    </style>
</head>
<body>

<div id="view-auth" class="auth-container">
    <div class="auth-card">
        <i class="fas fa-user-shield" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2 style="margin: 0 0 20px 0;">Verificación</h2>
        
        <div id="auth-step1">
            <div class="input-group">
                <i class="fas fa-mobile-alt"></i>
                <input type="tel" id="phone" placeholder="Celular">
            </div>
            <button class="btn-main" onclick="sendCode()">Enviar SMS</button>
        </div>

        <div id="auth-step2" class="hidden">
            <p style="font-size: 13px;">Código enviado: <b id="hint" style="color:var(--primary)"></b></p>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="number" id="otp" placeholder="Código">
            </div>
            <button class="btn-main" onclick="verify()">Verificar Cuenta</button>
        </div>
    </div>
</div>

<div id="view-market" class="hidden">
    <div class="header">
        <h3 style="margin:0"><i class="fas fa-store"></i> Market P2P</h3>
        <button onclick="logout()" style="width:auto; padding:5px 10px; background:transparent; color:gray;"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <div style="padding: 15px;">
        <button class="btn-main" style="background:#222; color:white; border:1px dashed #555;" onclick="openAddProduct()">
            <i class="fas fa-plus"></i> Publicar nuevo producto
        </button>
    </div>

    <div class="product-grid" id="grid">
        </div>
</div>

<div id="chat-view" class="hidden">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <span id="chat-product-name">Negociación</span>
    </div>
    <div id="messages"></div>
    <div style="padding:15px; background:var(--card); display:flex; gap:10px;">
        <label for="file-chat" style="background:#333; padding:10px; border-radius:8px;"><i class="fas fa-image"></i></label>
        <input type="file" id="file-chat" class="hidden" accept="image/*" onchange="sendImage(event)">
        <input type="text" id="chat-input" style="padding-left:15px;" placeholder="Escribe mensaje...">
        <button onclick="sendText()" class="btn-main" style="width:60px; margin:0;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    let code;
    let products = [
        { name: "Moto Honda Biz", price: "Gratis", img: "https://images.unsplash.com/photo-1558981403-c5f91cbcf523?w=400" },
        { name: "Laptop Acer Ryzen 7", price: "Bs. 589", img: "https://images.unsplash.com/photo-1517336714460-4c9889a79453?w=400" }
    ];

    function sendCode() {
        if(document.getElementById('phone').value.length < 5) return;
        code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('auth-step1').classList.add('hidden');
        document.getElementById('auth-step2').classList.remove('hidden');
        document.getElementById('hint').innerText = code;
    }

    function verify() {
        if(document.getElementById('otp').value == code) {
            localStorage.setItem('logged', 'true');
            loadMarket();
        }
    }

    function loadMarket() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-market').classList.remove('hidden');
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card" onclick="openChat('${p.name}')">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <div class="product-price">${p.price}</div>
                        <div class="product-title">${p.name}</div>
                    </div>
                </div>
            `;
        });
    }

    function openChat(name) {
        document.getElementById('chat-product-name').innerText = name;
        document.getElementById('view-market').classList.add('hidden');
        document.getElementById('chat-view').classList.remove('hidden');
    }

    function closeChat() {
        document.getElementById('chat-view').classList.add('hidden');
        document.getElementById('view-market').classList.remove('hidden');
    }

    function sendText() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        document.getElementById('messages').innerHTML += `<div class="msg sent">${input.value}</div>`;
        input.value = "";
    }

    function sendImage(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('messages').innerHTML += `
                <div class="msg sent"><img src="${event.target.result}" style="width:100%; border-radius:8px;"></div>
            `;
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => { if(localStorage.getItem('logged')) loadMarket(); };
</script>
</body>
</html>
