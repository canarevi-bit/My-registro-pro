<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .card { background: var(--card); padding: 40px 30px; border-radius: 20px; width: 85%; max-width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #333; position: relative; overflow: hidden; }
        
        /* Decoración superior */
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #00ff88, #007bff); }

        h2 { margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; transition: 0.3s; }
        
        input { width: 100%; padding: 14px 14px 14px 45px; border-radius: 10px; border: 2px solid #333; background: #222; color: white; font-size: 16px; transition: 0.3s; box-sizing: border-box; outline: none; }
        
        /* Efecto de enfoque (Focus) */
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        input:focus + i { color: var(--primary); }

        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-send { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .btn-send:active { transform: scale(0.98); }
        
        .hidden { display: none; }
        .hint-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div class="card" id="contenedor">
        </div>

    <script>
        let codigoGenerado;

        function cargarInterfaz() {
            const usuario = localStorage.getItem('usuarioRegistrado');
            const contenedor = document.getElementById('contenedor');

            if (usuario) {
                contenedor.innerHTML = `
                    <i class="fas fa-check-circle" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
                    <h2>¡Bienvenido!</h2>
                    <p>Sesión activa:<br><b>${usuario}</b></p>
                    <button class="btn-send" style="background: #333; color: white;" onclick="cerrarSesion()">Cerrar Sesión</button>
                `;
            } else {
                contenedor.innerHTML = `
                    <h2>Crear Cuenta</h2>
                    <div id="step1">
                        <div class="input-group">
                            <input type="tel" id="phone" placeholder="Número de celular">
                            <i class="fas fa-mobile-alt"></i>
                        </div>
                        <button class="btn-send" onclick="enviarCodigo()">Obtener Código</button>
                    </div>
                    <div id="step2" class="hidden">
                        <div class="hint-box">
                            <small style="color: #888;">SMS Simulado:</small><br>
                            <b id="hint" style="font-size: 20px; color: var(--primary);"></b>
                        </div>
                        <div class="input-group">
                            <input type="number" id="otpInput" placeholder="Código de 4 dígitos">
                            <i class="fas fa-key"></i>
                        </div>
                        <button class="btn-send" onclick="verificarCodigo()">Verificar Ahora</button>
                    </div>
                `;
            }
        }

        function enviarCodigo() {
            const phone = document.getElementById('phone').value;
            if (phone.length < 8) return alert("Por favor, ingresa un número válido");
            
            codigoGenerado = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('hint').innerText = codigoGenerado;
        }

        function verificarCodigo() {
            const input = document.getElementById('otpInput').value;
            if (input == codigoGenerado) {
                localStorage.setItem('usuarioRegistrado', document.getElementById('phone').value);
                cargarInterfaz();
            } else {
                alert("Código incorrecto");
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload();
        }

        window.onload = cargarInterfaz;
    </script>
</body>
</html>
