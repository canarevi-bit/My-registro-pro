<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp P2P</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yellow: #fbff00; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100%; overflow: hidden; }

        /* FONDO ANIMADO ESTILO WARP */
        .warp-bg {
            position: fixed; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://w0.peakpx.com/wallpaper/559/314/HD-wallpaper-warp-speed-star-trails-space-travel-hyper-speed.jpg');
            background-size: cover;
            animation: moveBg 20s linear infinite;
        }
        @keyframes moveBg {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { 
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px; border: 1px solid var(--yellow);
            width: 300px; text-align: center;
        }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: var(--yellow); }
        input { 
            width: 100%; padding: 12px 12px 12px 40px; border-radius: 10px; 
            border: 1px solid #444; background: #111; color: white; box-sizing: border-box; 
        }

        button { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            background: var(--yellow); color: black; font-weight: bold; cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="warp-bg"></div>
    <div class="container">
        <div class="card" id="auth-step1">
            <i class="fas fa-user-circle" style="font-size: 50px; color: var(--yellow); margin-bottom: 20px;"></i>
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="Celular">
            </div>
            <button onclick="sendCode()">OBTENER PIN</button>
        </div>
        
        <div class="card hidden" id="auth-step2">
            <h3 style="color: var(--yellow)">PIN: <span id="hint"></span></h3>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="number" id="otp" placeholder="Ingresa PIN">
            </div>
            <button onclick="verify()">ACCEDER</button>
        </div>
    </div>

    <script>
        let code;
        function sendCode() {
            if(document.getElementById('phone').value.length < 5) return;
            code = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('auth-step1').classList.add('hidden');
            document.getElementById('auth-step2').classList.remove('hidden');
            document.getElementById('hint').innerText = code;
        }
        function verify() {
            if(document.getElementById('otp').value == code) alert("¡Bienvenido!");
        }
    </script>
</body>
</html>
