
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* FONDO NEGRO TOTAL COMO EN TU VIDEO */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: sans-serif; 
        }

        /* CONTENEDOR DE ESTRELLAS */
        .warp-scene {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            perspective: 400px; z-index: -1;
        }

        .star {
            position: absolute; width: 2px; height: 2px; background: #fff;
            border-radius: 50%; opacity: 0;
            animation: warpMove 2s infinite linear;
        }

        /* EFECTO DE LÍNEAS ESTIRADAS (WARP) */
        @keyframes warpMove {
            0% { transform: translateZ(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateZ(400px) scale(15); opacity: 0; background: var(--primary); }
        }

        /* COLORES Y TARJETA CRISTAL */
        :root { --primary: #fbff00; }
        .glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 255, 0, 0.2);
            border-radius: 25px; padding: 30px;
            width: 85%; max-width: 320px; text-align: center;
        }

        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* ICONOS EN AMARILLO */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        input { 
            width: 100%; padding: 12px 12px 12px 45px; border-radius: 12px; 
            border: 1px solid #333; background: #000; color: white; box-sizing: border-box; 
        }
        
        button { 
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: var(--primary); color: #000; font-weight: bold; 
            box-shadow: 0 0 20px rgba(251, 255, 0, 0.4);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="warp-scene" id="stars-container"></div>

<div id="view-auth" class="auth-container">
    <div class="glass">
        <i class="fas fa-rocket" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2 style="color: white; margin-bottom: 30px;">WARP LOGIN</h2>
        
        <div id="auth-step1">
            <div class="input-group">
                <i class="fas fa-mobile-alt"></i>
                <input type="tel" id="phone" placeholder="Celular">
            </div>
            <button onclick="sendCode()">ENTRAR AL ESPACIO</button>
        </div>

        <div id="auth-step2" class="hidden">
            <p style="color: white;">PIN: <b id="hint" style="color:var(--primary)"></b></p>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="number" id="otp" placeholder="Código">
            </div>
            <button onclick="verify()">ACCEDER</button>
        </div>
    </div>
</div>

<script>
    // GENERADOR DE ESTRELLAS PARA EL EFECTO DEL VIDEO
    const container = document.getElementById('stars-container');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(star);
    }

    let code;
    function sendCode() {
        if(document.getElementById('phone').value.length < 5) return;
        code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('auth-step1').classList.add('hidden');
        document.getElementById('auth-step2').classList.remove('hidden');
        document.getElementById('hint').innerText = code;
    }

    function verify() {
        if(document.getElementById('otp').value == code) {
            alert("¡Conexión Exitosa!");
            // Aquí iría el resto de tu tienda
        }
    }
</script>
</body>
</html>
