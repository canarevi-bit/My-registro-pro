<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Warp Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fbff00; --bg: #050505; --card: rgba(20, 20, 20, 0.7); }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO WARP ANIMADO */
        .warp-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 500px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 100px, #fff, rgba(0,0,0,0));
            background-size: 400px 600px;
            animation: warpMove 8s linear infinite;
            opacity: 0.5;
        }

        @keyframes warpMove {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        .hidden { display: none !important; }
        .glass { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* REGISTRO CON ICONOS */
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .auth-card { background: var(--card); padding: 35px; border-radius: 25px; width: 100%; max-width: 320px; text-align: center; position: relative; }
        .auth-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--primary); border-radius: 25px 25px 0 0; }
