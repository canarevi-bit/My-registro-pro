<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace P2P</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-buy { background: var(--primary); color: black; }
        .btn-sell { background: #007bff; color: white; }
        .product-item { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        #chat-section { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; display: none; }
        #messages { height: 60vh; overflow-y: auto; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .sent { background: #007bff; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
        .img-preview { max-width: 100%; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div id="auth-section" class="card">
        <h2>Registro</h2>
        <input type="tel" id="user-phone" placeholder="Tu número de celular">
        <button class="btn-buy" onclick="login()">Entrar al Marketplace</button>
    </div>

    <div id="market-section" class="hidden" style="display:none;">
        <div class="card">
            <h3>Publicar Producto</h3>
            <input type="text" id="p-name" placeholder="Nombre del producto">
            <input type="number" id="p-price" placeholder="Precio ($)">
            <button class="btn-sell" onclick="publicar()">Publicar ahora</button>
        </div>

        <h3>Productos Disponibles</h3>
        <div id="products-list">
            </div>
    </div>
</div>

<div id="chat-section">
    <button onclick="cerrarChat()" style="width: auto; background: #444; color: white; margin-bottom: 10px;">⬅ Volver</button>
    <h2 id="chat-title">Negociación P2P</h2>
    <div id="messages"></div>
    
    <div style="display: flex; gap: 10px;">
        <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
        <button onclick="enviarTexto()" style="width: 60px;" class="btn-buy"><i class="fas fa-paper-plane"></i></button>
    </div>
    
    <label for="file-upload" style="display: block; background: #333; padding: 10px; text-align: center; border-radius: 8px; margin-top: 10px; cursor: pointer;">
        <i class="fas fa-image"></i> Subir Comprobante (Galería)
    </label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="enviarImagen(event)">
</div>

<script>
    let productos = [
        { nombre: "Bitcoin (Ejemplo)", precio: "45000" },
        { nombre: "Cuenta Premium", precio: "10" }
    ];

    function login() {
        const phone = document.getElementById('user-phone').value;
        if(phone.length < 5) return alert("Ingresa un número");
        localStorage.setItem('currentUser', phone);
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('market-section').style.display = 'block';
        actualizarProductos();
    }

    function publicar() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!name || !price) return alert("Completa los datos");
        
        productos.push({ nombre: name, precio: price });
        actualizarProductos();
        alert("¡Producto publicado!");
    }

    function actualizarProductos() {
        const list = document.getElementById('products-list');
        list.innerHTML = "";
        productos.forEach((p, index) => {
            list.innerHTML += `
                <div class="product-item">
                    <div>
                        <b>${p.nombre}</b><br>
                        <small>$${p.price || p.precio}</small>
                    </div>
                    <button class="btn-buy" style="width: auto;" onclick="abrirP2P('${p.nombre}')">Comprar</button>
                </div>
            `;
        });
    }

    function abrirP2P(producto) {
        document.getElementById('chat-title').innerText = "Comprando: " + producto;
        document.getElementById('chat-section').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }

    function cerrarChat() {
        document.getElementById('chat-section').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }

    function enviarTexto() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg sent">${input.value}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function enviarImagen(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const box = document.getElementById('messages');
            box.innerHTML += `
                <div class="msg sent">
                    <small>Comprobante enviado:</small><br>
                    <img src="${e.target.result}" class="img-preview">
                </div>
            `;
            box.scrollTop = box.scrollHeight;
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
