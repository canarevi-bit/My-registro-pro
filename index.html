<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp P2P Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yellow: #fbff00; --glass: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; height: 100%; }

        /* 1. LÁMPARA DE CUERDA (PULL SWITCH) */
        #dark-room { position: fixed; inset: 0; background: #050505; z-index: 2000; display: flex; justify-content: center; transition: 0.6s; }
        .pull-chain { width: 4px; height: 150px; background: #444; position: relative; cursor: pointer; transition: 0.2s; }
        .pull-chain:active { height: 170px; }
        .pull-handle { width: 20px; height: 40px; background: #666; position: absolute; bottom: -40px; left: -8px; border-radius: 5px; }
        .bulb-off { position: absolute; top: 0; font-size: 50px; color: #111; transform: translateY(-30px); }

        /* 2. EFECTO WARP (ESTRELLAS) */
        .warp-bg { position: fixed; inset: 0; z-index: -1; perspective: 600px; overflow: hidden; opacity: 0; transition: 1s; }
        .star { position: absolute; width: 2px; height: 2px; background: #fff; animation: warpSpeed 1.5s infinite linear; }
        @keyframes warpSpeed { 0% { transform: translateZ(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateZ(600px) scale(15); opacity: 0; } }

        .hidden { display: none !important; }

        /* 3. REGISTRO (GLASSCARD) */
        .auth-view { display: flex; justify-content: center; align-items: center; height: 100vh; opacity: 0; transition: 1s; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(251, 255, 0, 0.2); border-radius: 25px; padding: 30px; width: 85%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--yellow); font-weight: bold; color: #000; cursor: pointer; margin-top: 10px; }

        /* 4. MARKETPLACE P2P Y PRODUCTOS */
        .header { padding: 15px; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 2px solid var(--yellow); z-index: 100; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .p-card { border-radius: 15px; overflow: hidden; border: 1px solid #222; background: #111; font-size: 0.8em; }
        .p-img { width: 100%; height: 140px; object-fit: cover; }
        .p-info { padding: 10px; }
        .price { color: var(--yellow); font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div id="dark-room">
    <div class="pull-chain" onclick="pull()">
        <i class="fas fa-lightbulb bulb-off"></i>
        <div class="pull-handle"></div>
    </div>
</div>

<div class="warp-bg" id="stars"></div>

<div id="view-auth" class="auth-view">
    <div class="glass">
        <i class="fas fa-user-lock" style="font-size: 40px; color: var(--yellow); margin-bottom: 20px;"></i>
        <h2 style="margin:0 0 20px 0">REGISTRO</h2>
        <div id="step1">
            <input type="tel" id="user-tel" placeholder="Nro de Celular">
            <button onclick="sendPin()">PEDIR PIN</button>
        </div>
        <div id="step2" class="hidden">
            <p>PIN: <b id="pin-val" style="color:var(--yellow)"></b></p>
            <input type="number" id="pin-in" placeholder="0000">
            <button onclick="enterMarket()">INGRESAR AL P2P</button>
        </div>
    </div>
</div>

<div id="view-market" class="hidden">
    <div class="header">
        <h2 style="color:var(--yellow); margin:0;">P2P MARKET</h2>
        <i class="fas fa-plus-circle" style="font-size: 30px; color: var(--yellow); cursor: pointer;" onclick="openAdd()"></i>
    </div>
    <div class="grid" id="market-grid">
        </div>
</div>

<script>
    // Generar estrellas Warp
    const sC = document.getElementById('stars');
    for(let i=0; i<80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
        s.style.animationDelay = Math.random()*1.5+'s';
        sC.appendChild(s);
    }

    // Acción de la cuerda
    function pull() {
        document.getElementById('dark-room').style.opacity = '0';
        document.getElementById('stars').style.opacity = '1';
        document.getElementById('view-auth').style.opacity = '1';
        setTimeout(() => document.getElementById('dark-room').classList.add('hidden'), 600);
    }

    let myPin;
    function sendPin() {
        if(document.getElementById('user-tel').value.length < 5) return;
        myPin = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('pin-val').innerText = myPin;
    }

    function enterMarket() {
        if(document.getElementById('pin-in').value == myPin) {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-market').classList.remove('hidden');
            showItems();
        }
    }

    // Cargar productos y comprobantes
    let db = [
        { n: "Moto honda biz", p: "Gratis", i: "https://i.ibb.co/LzNf9P9/moto.jpg" },
        { n: "Laptop Ryzen 7", p: "Bs.589", i: "https://i.ibb.co/vX5YyY5/laptop.jpg" }
    ];

    function showItems() {
        const g = document.getElementById('market-grid');
        g.innerHTML = "";
        db.forEach(x => {
            g.innerHTML += `<div class="p-card"><img src="${x.i}" class="p-img"><div class="p-info"><div class="price">${x.p}</div><div>${x.n}</div></div></div>`;
        });
    }

    function openAdd() {
        const url = prompt("Pega el link de la foto del producto o comprobante:");
        const nom = prompt("Nombre o descripción:");
        const pre = prompt("Precio (Ej: Bs.100):");
        if(url && nom && pre) {
            db.unshift({n: nom, p: pre, i: url});
            showItems();
        }
    }
</script>
</body>
</html>
